name: Bug report
description: Something does not work as documented
labels: [bug]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Firmware
        - Hardware / electronics
        - 3D models / printing
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: setup
    attributes:
      label: Setup
      description: Board, build profile (gaming/drive), host OS, repo commit, printer and material if relevant
      placeholder: |
        ESP32-S3-DevKitC-1 N16R8, gaming build, Windows 11, commit ec533b9
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: idf.py monitor output, slicer warnings, screenshots
      render: text
